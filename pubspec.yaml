name: streakit
description: "A habit tracker app to build and maintain streaks."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  go_router: ^17.1.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  drift_dev: ^2.31.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
